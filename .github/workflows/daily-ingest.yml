name: Daily Tasks — RSS + AI Report

on:
  schedule:
    - cron: '0 0 * * *'   # UTC 00:00 daily
  workflow_dispatch:

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run RSS ingest
        run: node scripts/ingest_rss_standalone.js
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Build project (to verify data)
        run: npm run build
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Commit updated events
        run: |
          git config user.name "ai-monitor-bot"
          git config user.email "bot@aimonitor.local"
          git add data/events.json
          if git diff --cached --quiet; then
            echo "No event changes"
          else
            git commit -m "data: auto RSS ingest $(date -u +%Y-%m-%d)"
            git push
          fi
