name: Daily RSS Ingest

on:
  schedule:
    - cron: '0 8 * * *'   # UTC 08:00 (北京时间 16:00)
  workflow_dispatch:        # 手动触发

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Run RSS ingest
        run: node scripts/ingest_rss_standalone.js
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Commit updated events (if any)
        run: |
          git config user.name "ai-monitor-bot"
          git config user.email "bot@aimonitor.local"
          git add data/events.json
          git diff --cached --quiet || git commit -m "data: auto RSS ingest $(date -u +%Y-%m-%d)"
          git push
