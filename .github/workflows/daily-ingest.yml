name: 🤖 全球新闻 — 30分钟自动刷新

on:
  schedule:
    - cron: '*/30 * * * *'      # 每30分钟
  workflow_dispatch:

jobs:
  news:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install
        run: npm ci 2>&1 | tail -1

      - name: 📡 新闻引擎 v3 — 采集+解析+去重+AI
        run: node scripts/news_engine.js
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: 🔨 Build 验证
        run: npm run build 2>&1 | tail -3
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: 📊 报告
        run: cat data/report.json 2>/dev/null || echo "无报告"

      - name: � 发送 Web Push 通知
        run: node scripts/send_push.js
        continue-on-error: true

      - name: �📰 Commit & Push
        run: |
          git config user.name "ai-monitor-bot"
          git config user.email "bot@aimonitor.local"
          git add data/events.json data/report.json
          if git diff --cached --quiet; then
            echo "✅ 无变更"
          else
            COUNT=$(node -e "console.log(require('./data/events.json').length)")
            LATEST=$(node -e "console.log(require('./data/events.json')[0]?.timestamp?.slice(0,19)||'N/A')")
            git commit -m "📰 $(date -u +%m-%d\ %H:%M) — ${COUNT}条 | 最新: ${LATEST}"
            git push
            echo "✅ 推送成功"
          fi
