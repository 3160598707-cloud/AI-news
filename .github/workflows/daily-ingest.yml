name: 🤖 Daily News — RSS + AI Auto Refresh

on:
  schedule:
    - cron: '0 0 * * *'        # UTC 00:00 每天自动运行
    - cron: '0 12 * * *'       # UTC 12:00 每天第二次
  workflow_dispatch:            # 支持手动触发

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 📡 Step 1 — RSS 全球采集 (40+ 源)
        run: node scripts/ingest_rss_standalone.js
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: 🤖 Step 2 — DeepSeek AI 新闻生成
        run: node scripts/fetch_realtime_news.js
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: 🔨 Build 验证
        run: npm run build
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: 📊 提交更新
        run: |
          git config user.name "ai-monitor-bot"
          git config user.email "bot@aimonitor.local"
          git add data/events.json
          if git diff --cached --quiet; then
            echo "✅ 无新事件"
          else
            COUNT=$(node -e "console.log(require('./data/events.json').length)")
            git commit -m "📰 $(date -u +%Y-%m-%d) 日报 — ${COUNT} 条全球事件"
            git push
            echo "✅ 已推送 ${COUNT} 条事件"
          fi
