name: 🚀 自动部署

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: 🧪 生成静态 API
        run: node scripts/gen_static_api.js

      - name: 🏗️ 构建
        run: |
          npm ci
          npm run build

      - name: 📤 推送到 gh-pages
        run: |
          cd out
          touch .nojekyll
          git init
          git checkout -b gh-pages
          git add -A
          git config user.name "bot"
          git config user.email "bot@ai.local"
          git commit -m "🚀 自动部署"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages:gh-pages
